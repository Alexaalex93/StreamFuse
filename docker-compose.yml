services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      STREAMFUSE_ENV: ${STREAMFUSE_ENV:-development}
      STREAMFUSE_DEBUG: ${STREAMFUSE_DEBUG:-true}
      STREAMFUSE_DATABASE_URL: ${STREAMFUSE_DATABASE_URL:-sqlite:////data/streamfuse.db}
      STREAMFUSE_AUTO_SEED_MOCK: ${STREAMFUSE_AUTO_SEED_MOCK:-true}
    ports:
      - "8000:8000"
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/Alexaalex93/StreamFuse/main/frontend/public/favicon.svg"
    volumes:
      - ./backend:/app
      - streamfuse_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: dev
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000/api/v1}
    ports:
      - "5173:5173"
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/Alexaalex93/StreamFuse/main/frontend/public/favicon.svg"
    volumes:
      - ./frontend:/app
      - streamfuse_frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  db:
    profiles: ["postgres"]
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-streamfuse}
      POSTGRES_USER: ${POSTGRES_USER:-streamfuse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-streamfuse}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  streamfuse_data:
  streamfuse_frontend_node_modules: