services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: prod
    env_file:
      - .env
    environment:
      STREAMFUSE_ENV: production
      STREAMFUSE_DEBUG: false
      STREAMFUSE_DATABASE_URL: ${STREAMFUSE_DATABASE_URL_PROD:-postgresql+psycopg://streamfuse:streamfuse@db:5432/streamfuse}
      STREAMFUSE_AUTO_SEED_MOCK: ${STREAMFUSE_AUTO_SEED_MOCK_PROD:-false}
      STREAMFUSE_UVICORN_WORKERS: ${STREAMFUSE_UVICORN_WORKERS:-2}
      # Path inside the container where samba-status.json is read.
      # Matches the /host-shared bind mount below so the Unraid smbstatus
      # poller can write directly to the host path without knowing the
      # Docker named-volume location.
      STREAMFUSE_SAMBA_STATUS_JSON_PATH: /host-shared/samba-status.json
    ports:
      - "8000:8000"
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/Alexaalex93/StreamFuse/main/frontend/public/favicon.svg"
    volumes:
      - streamfuse_data:/data
      # Host-shared directory: the Unraid smbstatus poller writes
      # samba-status.json here; the container reads it at /host-shared/.
      - /mnt/user/appdata/streamfuse/host-shared:/host-shared
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: prod
    ports:
      - "8080:80"
      - "5173:80"
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/Alexaalex93/StreamFuse/main/frontend/public/favicon.svg"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-streamfuse}
      POSTGRES_USER: ${POSTGRES_USER:-streamfuse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-streamfuse}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
  streamfuse_data:
